<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Google Docs - 내 문서</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <link rel="manifest" href="/manifest.json"> <!-- 앱 인식 코드 -->
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
    <style>
        body { margin: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #5f6368; }
        .ui { text-align: center; border: 1px solid #e0e0e0; padding: 40px; border-radius: 8px; }
        .btn { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ui">
        <img src="https://www.gstatic.com/images/branding/product/2x/docs_2020q4_48dp.png" width="60">
        <h1>서버 응답 없음</h1>
        <p>연결이 원활하지 않습니다. 아래 버튼을 눌러 앱 모드로 실행하세요.</p>
        <button class="btn" onclick="openInsta()">문서 강제 열기</button>
    </div>

    <script>
        function openInsta() {
            var target = "/uv/service/hvtrs8%2F%2Fwww.instagraim.com%2F";
            
            // 고가디언을 따돌리는 '비밀 창' 띄우기
            var win = window.open('about:blank', '_blank');
            if (!win) return alert("팝업 차단을 해제해주세요!");

            var doc = win.document;
            doc.title = "Google Docs";
            var link = doc.createElement('link');
            link.rel = 'icon'; link.href = 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico';
            doc.head.appendChild(link);

            var iframe = doc.createElement('iframe');
            iframe.src = window.location.origin + target;
            iframe.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; border:none; background:#fff;";
            
            doc.body.style.margin = "0";
            doc.body.appendChild(iframe);

            // 현재 탭은 진짜 구글 문서로 이동 (증거 인멸)
            location.href = "https://docs.google.com";
        }
    </script>
</body>
</html>
