<!DOCTYPE html>
<html>
<head>
    <title>내 드라이브 - Google Drive</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_drive_favicon_5.ico">
</head>
<body style="margin:0;overflow:hidden;background:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">

    <!-- 선생님용 가짜 화면 -->
    <img src="https://www.gstatic.com/images/branding/product/2x/drive_2020q4_48dp.png" width="80">
    <h1 style="color:#5f6368;font-weight:400;">문서 로드 중...</h1>
    <button onclick="launch()" style="padding:10px 20px;background:#1a73e8;color:white;border:none;border-radius:4px;cursor:pointer;">새로고침</button>

    <script>
        function launch() {
            // [중요] 방금 만든 님의 넷리파이 엔진 주소를 아래 따옴표 안에 넣으세요!
            var myEngine = "https://tourmaline-cocada-81dca1.netlify.app/uv/service/hvtrs8%2F%2Fwww.instagraim.com%2F";

            // 고가디언이 감시 못하는 비밀 창 열기
            var win = window.open('about:blank', '_blank');
            if (!win) return alert("팝업 차단을 해제해주세요!");

            var doc = win.document;
            doc.title = "Google Drive";
            var link = doc.createElement('link');
            link.rel = 'icon'; link.href = 'https://ssl.gstatic.com/docs/doclist/images/infinite_drive_favicon_5.ico';
            doc.head.appendChild(link);

            var iframe = doc.createElement('iframe');
            iframe.src = myEngine;
            iframe.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;border:none;background:#fff;";
            
            doc.body.style.margin = "0";
            doc.body.appendChild(iframe);

            // 현재 탭은 구글 드라이브로 튀기
            location.href = "https://drive.google.com";
        }
    </script>
</body>
</html>
